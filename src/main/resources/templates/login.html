<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sign in</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f4f4f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: white;
            border-radius: 12px;
            border: 0.5px solid #e0ddd6;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .icon {
            width: 44px;
            height: 44px;
            background: #EEEDFE;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        .header p {
            font-size: 13px;
            color: #888780;
        }
        .field {
            margin-bottom: 1rem;
        }
        .field label {
            display: block;
            font-size: 13px;
            color: #5F5E5A;
            margin-bottom: 6px;
        }
        .field input {
            width: 100%;
            padding: 10px 12px;
            border: 0.5px solid #d3d1c7;
            border-radius: 8px;
            font-size: 14px;
            color: #1a1a1a;
            outline: none;
            transition: border-color 0.15s;
        }
        .field input:focus {
            border-color: #534AB7;
        }
        .field:last-of-type {
            margin-bottom: 1.5rem;
        }
        button[type="submit"] {
            width: 100%;
            padding: 11px;
            background: #534AB7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }
        button[type="submit"]:hover {
            background: #3C3489;
        }
        .error {
            color: #E24B4A;
            font-size: 13px;
            text-align: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <h1>Sign in</h1>
            <p>OAuth2 Authorization Server</p>
        </div>

        <form method="post" action="/login">
            <div class="field">
                <label>Email</label>
                <input type="text" name="username" placeholder="you@example.com"/>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••"/>
            </div>
            <button type="submit">Sign in</button>
        </form>

        <p class="error" th:if="${param.error}">Invalid email or password</p>
    </div>
</body>
</html>
